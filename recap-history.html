<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>历史复盘 · AI Daily Dock</title>
<link rel="stylesheet" href="css/dock.css">
<style>
  /* tokens / reset / 画布背景 → css/dock.css */
  .page{min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 24px 60px}
  .panel{width:600px; max-width:100%; max-height:88vh; background:var(--glass-1);
    border:1px solid var(--hair); border-radius:var(--r-panel); box-shadow:var(--sh-panel);
    display:flex; flex-direction:column; overflow:hidden}
  .panel__head{padding:18px 22px 16px; border-bottom:1px solid var(--hair-2); background:linear-gradient(180deg,rgba(255,255,255,0.34),rgba(255,255,255,0.04))}
  .back{font-size:11.5px; font-weight:600; color:var(--muted); text-decoration:none; display:inline-flex; align-items:center; gap:4px; margin-bottom:10px; transition:color .15s}
  .back:hover{color:var(--accent-ink)}
  .panel__title{font-size:20px; font-weight:700; color:var(--fg-strong); letter-spacing:-.015em; line-height:1.1}
  .panel__sub{font-size:12px; color:var(--muted); margin-top:4px}
  .panel__body{flex:1; overflow-y:auto; padding:18px 20px; display:flex; flex-direction:column; gap:0; scrollbar-width:thin; scrollbar-color:rgba(120,116,140,.3) transparent}
  .panel__body::-webkit-scrollbar{width:8px}
  .panel__body::-webkit-scrollbar-thumb{background:rgba(120,116,140,.22); border-radius:8px; border:2px solid transparent; background-clip:padding-box}
  .panel__foot{display:flex; gap:8px; padding:13px 18px; border-top:1px solid var(--hair-2); background:linear-gradient(0deg,rgba(255,255,255,0.4),rgba(255,255,255,0.06))}

  /* ===== 编辑式总览：一个大数字 + 内联指标，去掉等宽 tile 网格 ===== */
  .overview{display:flex; align-items:flex-end; gap:22px; flex-wrap:wrap; padding:2px 2px 18px; border-bottom:1px solid var(--hair-2)}
  .ov__hero{flex:none}
  .ov__big{font-family:var(--num); font-size:54px; font-weight:700; color:var(--fg-strong); letter-spacing:-.03em; line-height:.92}
  .ov__big small{font-size:21px; color:var(--muted); font-weight:600; letter-spacing:0}
  .ov__cap{font-size:12px; color:var(--muted); margin-top:8px}
  .ov__cap b{color:var(--fg-strong); font-weight:600}
  .ov__inline{display:flex; flex-wrap:wrap; gap:4px 24px; margin:0 0 6px; padding-left:24px; border-left:1px solid var(--hair-2)}
  .ov__inline .m{display:flex; flex-direction:column; gap:2px}
  .ov__inline .m b{font-family:var(--num); font-size:15px; font-weight:700; color:var(--fg-strong); font-variant-numeric:tabular-nums; letter-spacing:-.01em; line-height:1.1}
  .ov__inline .m span{font-size:10px; color:var(--muted)}

  /* ===== 趋势：非今日柱中性灰，只留今日强调 ===== */
  .trend{padding:16px 2px 18px; border-bottom:1px solid var(--hair-2)}
  .trend__cap{display:flex; align-items:baseline; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:12px}
  .trend__cap b{color:var(--fg-strong); font-weight:600}
  .chart{display:flex; align-items:flex-end; gap:8px; height:92px}
  .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end}
  .bar{width:100%; max-width:32px; border-radius:5px 5px 0 0; background:rgba(120,116,140,0.30); min-height:3px; transition:height .4s ease}
  .col.rest .bar{background:rgba(120,116,140,0.15)}
  .col.today .bar{background:linear-gradient(180deg,#2a4d7a,#1B365D); box-shadow:0 0 0 3px var(--accent-soft)}
  .col .cnt{font-family:var(--num); font-size:10px; font-weight:600; color:var(--muted-2)}
  .col .dl{font-size:10px; color:var(--muted-2); font-weight:600; line-height:1.3; text-align:center}
  .col.today .cnt{color:var(--fg-strong)}
  .col.today .dl{color:var(--fg-strong)}

  /* ===== 每日复盘列表 ===== */
  .archive{padding-top:16px}
  .archive__cap{font-size:11px; color:var(--muted); margin-bottom:10px; padding:0 2px}
  .entry{background:rgba(255,255,255,0.42); border:1px solid var(--hair); border-radius:var(--r-sub); overflow:hidden; transition:background .16s}
  .entry:hover{background:rgba(255,255,255,0.58)}
  .entry.is-today{background:rgba(255,255,255,0.62)}
  .entry + .entry{margin-top:8px}
  .entry__head{display:flex; align-items:center; gap:11px; padding:11px 13px; cursor:pointer; user-select:none}
  .entry__date{flex:none; width:72px}
  .entry__date b{display:block; font-family:var(--num); font-size:13px; font-weight:700; color:var(--fg-strong); font-variant-numeric:tabular-nums; line-height:1.1}
  .entry__date span{font-size:10px; color:var(--muted)}
  .entry__mid{flex:1; min-width:0}
  .entry__hi{font-size:12px; color:var(--fg); font-weight:500; line-height:1.35; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .entry__rate{font-family:var(--num); font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; flex:none}
  .entry__rate b{color:var(--fg-strong)}
  .entry__chev{color:var(--muted-2); flex:none; transition:transform .2s ease}
  .entry__chev svg{width:14px;height:14px; display:block}
  .entry.open .entry__chev{transform:rotate(90deg)}
  .entry__body{max-height:0; overflow:hidden; transition:max-height .35s ease}
  .entry.open .entry__body{max-height:420px}
  .entry__inner{padding:2px 13px 13px; border-top:1px solid var(--hair-2)}
  .entry__inner .blk{padding:10px 0; border-bottom:1px solid var(--hair-2)}
  .entry__inner .blk:last-child{border-bottom:none}
  .entry__inner .blk .h{font-size:9.5px; font-weight:700; color:var(--muted); letter-spacing:.04em; margin-bottom:5px}
  .entry__inner .li{font-size:11.5px; color:var(--fg); line-height:1.55; padding:2px 0; display:flex; gap:8px}
  .entry__inner .li .mk{color:var(--success); flex:none}
  .entry__inner .li.miss .mk{color:var(--warn-ink)}
  .entry__inner .li b{color:var(--fg-strong); font-weight:600}

  .pill{display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:600; padding:3px 8px; border-radius:var(--r-pill); line-height:1.4; white-space:nowrap}
  .pill--now{color:var(--accent-ink); background:var(--accent-soft)}
  .pill--rest{color:var(--muted); background:rgba(120,116,140,0.13)}

  .btn{font-family:var(--font); font-size:11.5px; font-weight:600; border-radius:var(--r-btn); padding:9px 14px; border:1px solid transparent; cursor:pointer; transition:background .16s, transform .1s; display:inline-flex; align-items:center; gap:6px}
  .btn--primary{background:var(--accent); color:#fff; box-shadow:0 6px 14px -6px var(--accent); flex:1; justify-content:center}
  .btn--primary:hover{background:var(--accent-strong)}
  .btn--primary:active{transform:translateY(1px)}
  .btn--ghost{background:var(--card-2); color:var(--fg); border-color:var(--hair); text-decoration:none}
  .btn--ghost:hover{background:#fff}
  /* a11y / 状态打磨 */
  :focus{outline:none}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .btn--primary:active{transform:translateY(1px)}
</style>
</head>
<body>
<div class="page">
  <main class="panel" aria-label="历史复盘">
    <header class="panel__head">
      <a class="back" href="dock.html">← 返回 Dock</a>
      <div class="panel__title">历史复盘</div>
      <div class="panel__sub">按日期归档的每日复盘</div>
    </header>

    <div class="panel__body" id="pageBody">
      <div style="padding:30px;text-align:center;color:var(--muted);font-size:12px"><span class="spinner" style="width:22px;height:22px;margin-bottom:10px"></span><div>加载中…</div></div>
    </div>

    <footer class="panel__foot">
      <button class="btn btn--primary" id="export">导出全部复盘</button>
      <a class="btn btn--ghost" href="dock.html">回到今天</a>
    </footer>
  </main>
</div>

<script>
(function(){
  var $=function(s,r){return (r||document).querySelector(s);};
  function esc(s){s=String(s==null?'':s);return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function toast(msg){
    var t=document.createElement('div');
    t.textContent=msg;
    Object.assign(t.style,{position:'fixed',left:'50%',bottom:'28px',transform:'translateX(-50%)',background:'rgba(34,36,54,0.92)',color:'#fff',fontFamily:'inherit',fontSize:'12px',fontWeight:'500',padding:'9px 14px',borderRadius:'12px',boxShadow:'0 14px 32px -10px rgba(40,42,80,0.45)',zIndex:'60',backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.12)',opacity:'0',transition:'opacity .25s, transform .25s'});
    document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';});
    setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(-50%) translateY(8px)';setTimeout(function(){t.remove();},300);},2000);
  }
  // 日期工具
  function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function dateLabel(dateStr){ // 'MM/DD'
    if(!dateStr) return '';
    var p=dateStr.split('-'); return p[1]+'/'+p[2];
  }
  var WEEKDAYS=['日','一','二','三','四','五','六'];
  function weekdayLabel(dateStr){var d=new Date(dateStr+'T00:00:00');return isNaN(d)?'':WEEKDAYS[d.getDay()];}
  function relativeDay(dateStr){
    var today=todayStr();
    if(dateStr===today) return '今天';
    var y=new Date(today+'T00:00:00'); y.setDate(y.getDate()-1);
    if(dateStr===y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0')) return '昨天';
    return '周'+weekdayLabel(dateStr);
  }

  function emptyState(msg){
    return '<div style="padding:50px 24px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.8">'+msg+'</div>';
  }

  function render(items){
    if(!items||items.length===0){
      $('#pageBody').innerHTML=emptyState('还没有历史复盘<br>去 Dock 生成今日复盘并点击「归档」后，记录会出现在这里<br><br><a href="dock.html" style="color:var(--ink);font-weight:600">打开 Dock →</a>');
      return;
    }

    // —— 总览 ——
    var totalDone=0, totalAll=0, totalAi=0;
    items.forEach(function(it){ totalDone+=it.doneCount||0; totalAll+=it.totalCount||0; totalAi+=it.aiCount||0; });
    var rate=totalAll>0?Math.round(totalDone/totalAll*100):0;
    var streak=calcStreak(items);
    var ov='<section class="overview"><div class="ov__hero">'
      +'<div class="ov__big">'+totalDone+'<small>/'+totalAll+'</small></div>'
      +'<div class="ov__cap">累计已完成，完成率 <b>'+rate+'%</b>，连续 <b>'+streak+' 天</b></div></div>'
      +'<div class="ov__inline"><div class="m"><b>'+totalAi+'</b><span>AI 协作（项）</span></div>'
      +'<div class="m"><b>'+items.length+'</b><span>复盘记录</span></div></div></section>';

    // —— 7 天趋势 ——
    var trend='<section class="trend"><div class="trend__cap"><span>近 7 天每日完成数</span><span>今天 <b>'+(findByDate(items,todayStr())?findByDate(items,todayStr()).doneCount:0)+'</b></span></div><div class="chart">';
    var maxCnt=1;
    var days=last7Days();
    days.forEach(function(d){ var it=findByDate(items,d.date); var c=it?it.doneCount:0; if(c>maxCnt)maxCnt=c; });
    days.forEach(function(d){
      var it=findByDate(items,d.date); var c=it?it.doneCount:0;
      var pct=Math.max(6, Math.round(c/maxCnt*100));
      var cls=d.date===todayStr()?'col today':(c===0?'col rest':'col');
      trend+='<div class="'+cls+'"><div class="cnt">'+c+'</div><div class="bar" style="height:'+pct+'%"></div><div class="dl">'+weekdayLabel(d.date)+'<br>'+dateLabel(d.date)+'</div></div>';
    });
    trend+='</div></section>';

    // —— 每日复盘列表 ——
    var list='<section class="archive"><div class="archive__cap">每日复盘（'+items.length+'）</div>';
    items.forEach(function(it,idx){
      var isOpen=(idx===0); // 默认展开第一条
      var pillHtml='';
      if(it.date===todayStr()){ pillHtml='<span class="pill pill--now">今日</span>'; }
      else if((it.doneCount||0)===0){ pillHtml='<span class="pill pill--rest">休息</span>'; }
      // entry head
      list+='<div class="entry'+(isOpen?' open':'')+'" data-entry>'
        +'<div class="entry__head">'
        +'<div class="entry__date"><b>'+dateLabel(it.date)+'</b><span>'+relativeDay(it.date)+' · 周'+weekdayLabel(it.date)+'</span></div>'
        +'<div class="entry__mid"><div class="entry__hi">'+esc(it.summary||'')+'</div></div>'
        +pillHtml
        +'<span class="entry__rate"><b>'+(it.doneCount||0)+'</b>/'+(it.totalCount||0)+'</span>'
        +'<span class="entry__chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>'
        +'</div><div class="entry__body"><div class="entry__inner">';
      // 完成事项
      if(it.doneTasks&&it.doneTasks.length){
        list+='<div class="blk"><div class="h">完成事项</div>';
        it.doneTasks.forEach(function(t){ list+='<div class="li"><span class="mk">✓</span><span>'+esc(t.title)+(t.desc&&t.desc!=='双击写点什么'?' · <b>'+esc(t.desc)+'</b>':'')+'</span></div>'; });
        list+='</div>';
      }
      // 未完成与原因
      if(it.missTasks&&it.missTasks.length){
        list+='<div class="blk"><div class="h">未完成与原因</div>';
        it.missTasks.forEach(function(t){
          list+='<div class="li miss"><span class="mk">·</span><span><b>'+esc(t.title)+'</b>'+(t.reason?'，'+esc(t.reason):(t.desc&&t.desc!=='双击写点什么'?'，'+esc(t.desc):''))+'</span></div>';
        });
        list+='</div>';
      }
      // 明日建议
      if(it.advice){
        list+='<div class="blk"><div class="h">明日建议</div>';
        it.advice.split('\n').forEach(function(line){ if(line.trim()) list+='<div class="li"><span class="mk">→</span><span>'+esc(line.trim())+'</span></div>'; });
        list+='</div>';
      }
      list+='</div></div></div>';
    });
    list+='</section>';

    $('#pageBody').innerHTML=ov+trend+list;

    // 绑定展开/收起
    document.querySelectorAll('[data-entry]').forEach(function(en){
      var head=en.querySelector('.entry__head');
      if(head) head.addEventListener('click',function(){ en.classList.toggle('open'); });
    });
  }

  // 工具：最近7天（含今天，从6天前到今天）
  function last7Days(){
    var arr=[]; var d=new Date();
    for(var i=6;i>=0;i--){
      var dd=new Date(d); dd.setDate(dd.getDate()-i);
      arr.push({date:dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0')});
    }
    return arr;
  }
  function findByDate(items,dateStr){
    for(var i=0;i<items.length;i++){ if(items[i].date===dateStr) return items[i]; }
    return null;
  }
  // 连续天数（从今天往前，有记录就算）
  function calcStreak(items){
    var set={}; items.forEach(function(it){ set[it.date]=true; });
    var streak=0; var d=new Date();
    for(var i=0;i<365;i++){
      var dd=new Date(d); dd.setDate(dd.getDate()-i);
      var ds=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
      if(set[ds]) streak++; else if(i>0) break; // 今天没记录不算断，但昨天没就断
    }
    return streak;
  }

  // —— 加载数据 ——
  if(window.dock&&window.dock.recaps&&window.dock.recaps.list){
    window.dock.recaps.list().then(function(r){
      render((r&&r.ok&&r.items)||[]);
    }).catch(function(e){ $('#pageBody').innerHTML=emptyState('加载失败：'+esc(e.message||e)); });
  } else if(window.dock&&window.dock.data){
    // 兼容：用通用 data:load
    window.dock.data.load('recaps').then(function(r){
      var items=[];
      if(r&&r.ok&&r.data){ if(Array.isArray(r.data))items=r.data; else if(Array.isArray(r.data.items))items=r.data.items; }
      render(items);
    }).catch(function(){ render([]); });
  } else {
    render([]);
  }

  // 导出
  document.getElementById('export').addEventListener('click',function(){
    if(window.dock&&window.dock.recaps&&window.dock.recaps.list){
      window.dock.recaps.list().then(function(r){
        var items=(r&&r.ok&&r.items)||[];
        var blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a'); a.href=url; a.download='recaps-'+todayStr()+'.json';
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        toast('已导出 '+items.length+' 条复盘');
      });
    } else { toast('需在桌面应用中运行'); }
  });
})();
</script>
</body>
</html>
