<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent 任务详情 · AI Daily Dock</title>
<link rel="stylesheet" href="css/dock.css">
<style>
  /* tokens / reset / 画布背景 → css/dock.css */
  .page{min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 24px 60px}
  .panel{width:600px; max-width:100%; max-height:88vh; background:var(--glass-1);
    border:1px solid var(--hair); border-radius:var(--r-panel); box-shadow:var(--sh-panel);
    display:flex; flex-direction:column; overflow:hidden}
  .panel__head{padding:18px 22px 16px; border-bottom:1px solid var(--hair-2); background:linear-gradient(180deg,rgba(255,255,255,0.34),rgba(255,255,255,0.04))}
  .back{font-size:11.5px; font-weight:600; color:var(--muted); text-decoration:none; display:inline-flex; align-items:center; gap:4px; margin-bottom:10px; transition:.15s}
  .back:hover{color:var(--accent-ink)}
  .htop{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .panel__title{font-size:19px; font-weight:700; color:var(--fg-strong); letter-spacing:-.015em; line-height:1.2; flex:1; min-width:0}
  .meta{display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:11px; color:var(--muted)}
  .meta b{color:var(--fg); font-weight:600}
  .meta .live{width:6px;height:6px;border-radius:50%;background:var(--info); box-shadow:0 0 0 0 var(--info-soft); animation:pulse 1.9s infinite; display:inline-block; margin-right:5px; vertical-align:middle}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(27,54,93,.45)} 70%{box-shadow:0 0 0 7px rgba(27,54,93,0)} 100%{box-shadow:0 0 0 0 rgba(27,54,93,0)}}
  .panel__body{flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; scrollbar-width:thin; scrollbar-color:rgba(120,116,140,.3) transparent}
  .panel__body::-webkit-scrollbar{width:8px}
  .panel__body::-webkit-scrollbar-thumb{background:rgba(120,116,140,.22); border-radius:8px; border:2px solid transparent; background-clip:padding-box}
  .panel__foot{display:flex; gap:8px; padding:13px 18px; border-top:1px solid var(--hair-2); background:linear-gradient(0deg,rgba(255,255,255,0.4),rgba(255,255,255,0.06))}

  .pill{display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:600; padding:3px 9px; border-radius:var(--r-pill); line-height:1.4; white-space:nowrap}
  .pill .pd{width:5px;height:5px;border-radius:50%}
  .pill--done{color:var(--success); background:var(--success-soft)} .pill--done .pd{background:var(--success)}
  .pill--ai{color:var(--info-ink); background:var(--info-soft)} .pill--ai .pd{background:var(--info)}
  .pill--todo{color:var(--muted); background:rgba(120,116,140,0.13)}
  .pill--fail{color:var(--danger); background:var(--danger-soft)}

  .sec{background:var(--card); border:1px solid var(--hair); border-radius:var(--r-card); padding:14px 15px}
  .sec__h{font-size:13px; font-weight:700; color:var(--fg-strong); letter-spacing:-.005em; margin-bottom:12px; display:flex; align-items:center; gap:6px}

  .quote{font-size:13px; color:var(--fg); line-height:1.55; padding:12px 14px; background:var(--info-soft); border:1px solid var(--hair); border-radius:var(--r-sub)}
  .relate{font-size:11px; color:var(--muted); margin-top:10px; display:flex; align-items:center; gap:6px}
  .relate a{color:var(--accent-ink); text-decoration:none; font-weight:600}
  .relate a:hover{text-decoration:underline}

  .tl{position:relative}
  .step{display:grid; grid-template-columns:20px 1fr auto; column-gap:11px; align-items:start; padding:6px 0; position:relative}
  .step__dot{width:18px;height:18px;border-radius:50%; display:grid; place-items:center; flex:none; margin-top:1px; background:#fff; border:1.5px solid var(--muted-2); color:#fff}
  .step--done .step__dot{background:var(--success); border-color:var(--success)}
  .step--active .step__dot{background:#fff; border:1.5px solid var(--info); color:var(--info)}
  .step__dot svg{width:11px;height:11px}
  .spinner{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--info-soft); border-top-color:var(--info); animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .step__txt{font-size:12.5px; color:var(--fg-strong); font-weight:500; line-height:1.4}
  .step--active .step__txt{color:var(--info-ink); font-weight:600}
  .step--pending .step__txt{color:var(--muted)}
  .step__log{font-family:var(--num); font-size:10.5px; color:var(--muted); margin-top:4px; line-height:1.5; background:rgba(255,255,255,0.4); border:1px solid var(--hair-2); border-radius:var(--r-xs); padding:5px 8px}
  .step__time{font-family:var(--num); font-size:10.5px; color:var(--muted-2); padding-top:3px; font-variant-numeric:tabular-nums}
  .step:not(:last-child)::before{content:''; position:absolute; left:8.5px; top:23px; bottom:-6px; width:1.6px; background:var(--hair-2)}
  .step--done:not(:last-child)::before{background:var(--success-soft)}

  .mod{display:flex; align-items:flex-start; gap:11px; padding:9px 0; border-bottom:1px solid var(--hair-2)}
  .mod:last-child{border-bottom:none}
  .mod__n{font-family:var(--num); font-size:10px; font-weight:700; color:var(--fg-strong); background:var(--card-2); border:1px solid var(--hair); width:20px; height:20px; border-radius:var(--r-xs); display:grid; place-items:center; flex:none}
  .mod__b{flex:1; min-width:0}
  .mod__t{font-size:12.5px; font-weight:600; color:var(--fg-strong); line-height:1.3}
  .mod__d{font-size:11px; color:var(--muted); margin-top:2px; line-height:1.4}
  .mod__c{font-size:10px; color:var(--muted); background:rgba(120,116,140,0.13); padding:3px 8px; border-radius:var(--r-pill); white-space:nowrap; font-weight:600}

  .params{display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--hair-2); border:1px solid var(--hair); border-radius:var(--r-sub); overflow:hidden}
  .param{background:var(--card); padding:10px 12px}
  .param .k{font-size:10px; color:var(--muted)}
  .param .v{font-size:12.5px; color:var(--fg-strong); font-weight:600; margin-top:3px; font-family:var(--num); font-variant-numeric:tabular-nums}
  .param .v.sans{font-family:var(--font)}

  .run{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--hair-2)}
  .run:last-child{border-bottom:none}
  .run__d{font-family:var(--num); font-size:11px; color:var(--muted); width:96px; flex:none; font-variant-numeric:tabular-nums}
  .run__r{font-size:11.5px; color:var(--fg); flex:1; min-width:0}
  .run__r b{color:var(--fg-strong); font-weight:600}

  .btn{font-family:var(--font); font-size:11.5px; font-weight:600; border-radius:var(--r-btn); padding:9px 13px; border:1px solid transparent; cursor:pointer; transition:.16s; display:inline-flex; align-items:center; gap:6px; white-space:nowrap}
  .btn--primary{background:var(--accent); color:#fff; box-shadow:0 6px 14px -6px var(--accent); flex:1; justify-content:center}
  .btn--primary:hover{background:var(--accent-strong)}
  .btn--ghost{background:var(--card-2); color:var(--fg); border-color:var(--hair)}
  .btn--ghost:hover{background:#fff}
  .btn--soft{background:transparent; color:var(--muted)}
  .btn--soft:hover{color:var(--fg-strong); background:var(--card-2)}

  /* a11y / 状态打磨 */
  :focus{outline:none}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .btn--primary:active,.btn--ghost:active{transform:translateY(1px)}
  .btn--soft:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="page">
  <main class="panel" aria-label="Agent 任务详情">
    <header class="panel__head">
      <a class="back" href="dock.html">← 返回 Dock</a>
      <div class="htop">
        <div class="panel__title" id="pageTitle">Agent 任务详情</div>
        <span class="pill" id="pagePill"><span class="pd"></span>—</span>
      </div>
      <div class="meta" id="pageMeta"></div>
    </header>

    <div class="panel__body" id="pageBody">
      <!-- 列表态 / 详情态由 JS 动态渲染 -->
      <div style="padding:30px;text-align:center;color:var(--muted);font-size:12px"><span class="spinner" style="width:22px;height:22px;margin-bottom:10px"></span><div>加载中…</div></div>
    </div>

    <footer class="panel__foot" id="pageFoot">
      <button class="btn btn--ghost" data-act="back-list" style="flex:1">返回列表</button>
    </footer>
  </main>
</div>

<script>
(function(){
  var $=function(s,r){return (r||document).querySelector(s);};
  function esc(s){s=String(s==null?'':s);return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function toast(msg){
    var t=document.createElement('div');
    t.textContent=msg;
    Object.assign(t.style,{position:'fixed',left:'50%',bottom:'28px',transform:'translateX(-50%)',background:'rgba(34,36,54,0.92)',color:'#fff',fontFamily:'inherit',fontSize:'12px',fontWeight:'500',padding:'9px 14px',borderRadius:'12px',boxShadow:'0 14px 32px -10px rgba(40,42,80,0.45)',zIndex:'60',backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.12)',opacity:'0',transition:'opacity .25s, transform .25s'});
    document.body.appendChild(t); requestAnimationFrame(function(){t.style.opacity='1';});
    setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(-50%) translateY(8px)';setTimeout(function(){t.remove();},300);},2000);
  }
  // 状态徽标
  function pillFor(status){
    var m={running:{cls:'pill--ai',txt:'执行中'},done:{cls:'pill--done',txt:'已完成'},failed:{cls:'pill--fail',txt:'失败'},error:{cls:'pill--fail',txt:'出错'},cancelled:{cls:'pill--todo',txt:'已取消'},unknown:{cls:'pill--todo',txt:'未知'}};
    var v=m[status]||m.unknown;
    return '<span class="pill '+v.cls+'"><span class="pd"></span>'+v.txt+'</span>';
  }
  // 时间格式化
  function fmtTime(iso){ if(!iso) return '-'; try{var d=new Date(iso);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');}catch(e){return '-';} }
  function fmtDuration(a,b){ if(!a||!b) return '-'; var ms=new Date(b)-new Date(a); if(isNaN(ms)||ms<0) return '-'; var s=Math.round(ms/1000); if(s<60) return s+'s'; var m=Math.floor(s/60); return m+'m '+(s%60)+'s'; }

  var queryParams=new URLSearchParams(location.search);
  var detailId=queryParams.get('id');
  var pollTimer=null;

  // —— 列表态：渲染历史 + 运行中 ——
  function renderList(){
    $('#pageTitle').textContent='Agent 运行历史';
    $('#pagePill').outerHTML='<span class="pill pill--todo" id="pagePill"><span class="pd"></span>历史</span>';
    $('#pageMeta').innerHTML='';
    $('#pageFoot').style.display='none';

    if(!window.dock||!window.dock.agent){
      $('#pageBody').innerHTML=emptyState('需在桌面应用中运行');
      return;
    }
    Promise.all([
      window.dock.agent.runs(),
      window.dock.agent.list()
    ]).then(function(res){
      var runs=(res[0]&&res[0].ok&&res[0].runs)||[];
      var running=(res[1]&&res[1].ok&&res[1].tasks)||[];
      var html='';
      // 运行中
      if(running.length>0){
        html+='<div class="sec__h" style="margin-bottom:10px"><span class="live" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--info);margin-right:5px;vertical-align:middle"></span>运行中（'+running.length+'）</div>';
        running.forEach(function(t){
          html+='<a class="mod" style="text-decoration:none;color:inherit;cursor:pointer" href="agent-detail.html?id='+esc(t.taskId)+'">'
            +'<span class="mod__n">▶</span>'
            +'<div class="mod__b"><div class="mod__t">'+esc(t.agent)+' · '+esc((t.prompt||'').slice(0,40))+'</div>'
            +'<div class="mod__d">'+fmtTime(t.startTime)+' 起</div></div>'
            +pillFor(t.status)+'</a>';
        });
        html+='<div style="height:14px"></div>';
      }
      // 历史
      html+='<div class="sec__h" style="margin-bottom:10px">历史记录（'+runs.length+'）</div>';
      if(runs.length===0){
        html+=emptyState('还没有 Agent 运行记录<br>去 Dock 给任务派活后，完成的记录会出现在这里');
      } else {
        runs.forEach(function(r){
          html+='<a class="mod" style="text-decoration:none;color:inherit;cursor:pointer" href="agent-detail.html?id='+esc(r.taskId)+'">'
            +'<span class="mod__n">'+esc((r.prompt||'?').slice(0,1))+'</span>'
            +'<div class="mod__b"><div class="mod__t">'+esc((r.prompt||'未命名任务').slice(0,50))+'</div>'
            +'<div class="mod__d">'+esc(r.agent)+' · '+fmtTime(r.startTime)+'</div></div>'
            +pillFor(r.status)+'</a>';
        });
      }
      $('#pageBody').innerHTML=html;
    }).catch(function(e){
      $('#pageBody').innerHTML=emptyState('加载失败：'+esc(e.message||e));
    });
  }

  function emptyState(msg){
    return '<div style="padding:40px 20px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7">'+msg+'</div>';
  }

  // —— 详情态：渲染单次运行 ——
  function renderDetail(taskId){
    if(!window.dock||!window.dock.agent){ $('#pageBody').innerHTML=emptyState('需在桌面应用中运行'); return; }
    // 先查历史，再查运行中（运行中需要轮询）
    window.dock.agent.run(taskId).then(function(histR){
      if(histR&&histR.ok&&histR.run){
        renderRunDetail(histR.run, false);
      } else {
        // 不在历史 → 可能正在运行
        window.dock.agent.status(taskId).then(function(sr){
          if(sr&&sr.ok){
            renderRunDetail(sr, true); // true = 运行中，需轮询
          } else {
            $('#pageTitle').textContent='记录不存在';
            $('#pageBody').innerHTML=emptyState('找不到该 Agent 任务记录<br><a href="agent-detail.html" style="color:var(--ink)">返回列表</a>');
          }
        });
      }
    });
  }

  function renderRunDetail(run, isRunning){
    $('#pageTitle').textContent=(run.prompt||'Agent 任务').slice(0,30)+((run.prompt&&run.prompt.length>30)?'…':'');
    $('#pagePill').outerHTML=pillFor(run.status).replace('<span class="pill','<span class="pill" id="pagePill"');
    // meta
    var metaHtml='<span>Agent <b>'+esc(run.agent||'-')+'</b></span>'
      +'<span>开始 <b>'+fmtTime(run.startTime)+'</b></span>'
      +'<span>耗时 <b>'+fmtDuration(run.startTime,run.endTime)+'</b></span>';
    if(run.exitCode!=null) metaHtml+='<span>退出码 <b>'+run.exitCode+'</b></span>';
    $('#pageMeta').innerHTML=metaHtml;

    var body='';
    // 原始指令
    body+='<section class="sec"><div class="sec__h">原始指令</div><div class="quote">'+esc(run.prompt||'(无)')+'</div></section>';
    // 输出
    body+='<section class="sec"><div class="sec__h">'+(isRunning?'实时输出':'输出结果')+'</div>';
    if(run.output){
      body+='<pre style="font-family:var(--num);font-size:10.5px;line-height:1.5;color:var(--fg);background:var(--card-2);border:1px solid var(--hair);border-radius:var(--r-sub);padding:10px 12px;max-height:50vh;overflow:auto;white-space:pre-wrap;word-break:break-word;margin:0">'+esc(run.output)+'</pre>';
    } else if(isRunning){
      body+='<div style="padding:14px;text-align:center"><span class="spinner" style="width:18px;height:18px;margin-bottom:8px"></span><div style="font-size:11px;color:var(--muted)">Agent 执行中…</div></div>';
    } else {
      body+='<div style="padding:14px;font-size:11px;color:var(--muted)">（无输出）</div>';
    }
    body+='</section>';
    // 运行参数
    body+='<section class="sec"><div class="sec__h">运行参数</div><div class="params">'
      +'<div class="param"><div class="k">Agent</div><div class="v sans">'+esc(run.agent||'-')+'</div></div>'
      +'<div class="param"><div class="k">状态</div><div class="v sans">'+esc(run.status||'-')+'</div></div>'
      +'<div class="param"><div class="k">开始</div><div class="v">'+fmtTime(run.startTime)+'</div></div>'
      +'<div class="param"><div class="k">结束</div><div class="v">'+fmtTime(run.endTime)+'</div></div>'
      +'<div class="param" style="grid-column:1/-1"><div class="k">工作目录</div><div class="v sans" style="font-size:11px;word-break:break-all">'+esc(run.cwd||'-')+'</div></div>'
      +'</div></section>';
    $('#pageBody').innerHTML=body;

    // 底部按钮
    var foot='<button class="btn btn--ghost" data-act="back-list" style="flex:1">返回列表</button>';
    if(isRunning){ foot+='<button class="btn btn--soft" data-act="cancel" data-task="'+esc(run.taskId)+'" style="flex:1">取消任务</button>'; }
    foot+='<button class="btn btn--primary" data-act="copy" data-output="'+esc((run.output||'').slice(0,4000))+'" style="flex:1">复制输出</button>';
    $('#pageFoot').innerHTML=foot;
    $('#pageFoot').style.display='flex';

    // 运行中 → 轮询
    if(isRunning){ startPolling(run.taskId); } else { stopPolling(); }
  }

  function startPolling(taskId){
    stopPolling();
    var cnt=0;
    pollTimer=setInterval(function(){
      cnt++;
      window.dock.agent.status(taskId).then(function(sr){
        if(!sr||!sr.ok) return;
        if(sr.status==='done'||sr.status==='failed'||sr.status==='error'||sr.status==='cancelled'){
          stopPolling();
          renderRunDetail(sr, false);
          toast('Agent 已结束 · '+sr.status);
        } else if(cnt%3===0){
          // 每 6s 刷新一次输出（避免太频繁）
          renderRunDetail(sr, true);
        }
      });
      if(cnt>120){ stopPolling(); } // 4 分钟超时
    },2000);
  }
  function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

  // 底部按钮
  document.addEventListener('click',function(e){
    var btn=e.target.closest('[data-act]'); if(!btn) return;
    var act=btn.dataset.act;
    if(act==='back-list'){ stopPolling(); location.href='agent-detail.html'; }
    else if(act==='cancel'){
      var tid=btn.dataset.task;
      if(window.dock.agent.cancel){ window.dock.agent.cancel(tid).then(function(r){ toast(r&&r.ok?'已取消任务':'取消失败'); if(r&&r.ok) setTimeout(function(){location.reload();},500); }); }
    }
    else if(act==='copy'){
      var txt=btn.dataset.output||'';
      if(window.dock.ai&&window.dock.ai.copyToClipboard){ window.dock.ai.copyToClipboard(txt).then(function(){toast('已复制输出');}); }
      else if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(function(){toast('已复制输出');}); }
    }
  });

  // 启动
  if(detailId){ renderDetail(detailId); } else { renderList(); }
})();
</script>
</body>
</html>
